<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生词本 - Chrome翻译插件</title>
  <link rel="stylesheet" href="vocabulary.css">
</head>
<body>
  <div class="vocabulary-container">
    <!-- 头部 -->
    <header class="vocabulary-header">
      <div class="header-left">
        <button id="backBtn" class="back-btn">← 返回</button>
        <h1>我的生词本</h1>
      </div>
      <div class="header-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索生词...">
          <button id="searchBtn">🔍</button>
        </div>
      </div>
    </header>

    <!-- 工具栏 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <select id="sortBy">
          <option value="addedDate">按添加时间</option>
          <option value="word">按字母顺序</option>
          <option value="masteryLevel">按掌握程度</option>
          <option value="reviewCount">按复习次数</option>
        </select>
        <select id="filterBy">
          <option value="all">全部词汇</option>
          <option value="new">新词汇</option>
          <option value="learning">学习中</option>
          <option value="mastered">已掌握</option>
          <option value="difficult">困难词汇</option>
        </select>
      </div>
      <div class="toolbar-right">
        <span class="word-count">共 <span id="totalCount">0</span> 个生词</span>
        <button id="exportBtn" class="secondary-btn">导出</button>
        <button id="reviewBtn" class="primary-btn">开始复习</button>
      </div>
    </div>

    <!-- 生词列表 -->
    <main class="vocabulary-main">
      <div id="vocabularyList" class="vocabulary-list">
        <!-- 生词项将通过JavaScript动态生成 -->
      </div>
      
      <!-- 空状态 -->
      <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-icon">📚</div>
        <h3>还没有收集任何生词</h3>
        <p>在浏览网页时选中单词并点击收藏按钮来添加生词</p>
      </div>

      <!-- 加载状态 -->
      <div id="loadingState" class="loading-state">
        <div class="loading-spinner"></div>
        <p>正在加载生词...</p>
      </div>
    </main>

    <!-- 分页 -->
    <div class="pagination">
      <button id="prevPage" class="page-btn" disabled>上一页</button>
      <span class="page-info">
        第 <span id="currentPage">1</span> 页，共 <span id="totalPages">1</span> 页
      </span>
      <button id="nextPage" class="page-btn" disabled>下一页</button>
    </div>
  </div>

  <!-- 词汇详情模态框 -->
  <div id="wordModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalWord">单词</h2>
        <button id="closeModal" class="close-btn">×</button>
      </div>
      <div class="modal-body">
        <div class="word-details">
          <div class="detail-item">
            <label>翻译：</label>
            <span id="modalTranslation">翻译内容</span>
          </div>
          <div class="detail-item">
            <label>语境：</label>
            <span id="modalContext">语境内容</span>
          </div>
          <div class="detail-item">
            <label>来源：</label>
            <a id="modalSource" href="#" target="_blank">来源链接</a>
          </div>
          <div class="detail-item">
            <label>添加时间：</label>
            <span id="modalAddedDate">添加时间</span>
          </div>
          <div class="detail-item">
            <label>复习次数：</label>
            <span id="modalReviewCount">0</span>
          </div>
          <div class="detail-item">
            <label>掌握程度：</label>
            <div class="mastery-level">
              <div id="modalMasteryLevel" class="mastery-bar">
                <div class="mastery-fill"></div>
              </div>
              <span id="modalMasteryText">新词汇</span>
            </div>
          </div>
          <div class="detail-item">
            <label>下次复习：</label>
            <span id="modalNextReview">下次复习时间</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="deleteWord" class="danger-btn">删除</button>
        <button id="markAsMastered" class="secondary-btn">标记为已掌握</button>
        <button id="reviewWord" class="primary-btn">立即复习</button>
      </div>
    </div>
  </div>

  <script src="vocabulary.js"></script>
</body>
</html>
