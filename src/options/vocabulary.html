<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Notebook - LexiBridge Translate</title>
  <link rel="stylesheet" href="vocabulary.css">
</head>
<body>
  <div class="vocabulary-container">
    <header class="vocabulary-header">
      <div class="header-left">
        <button id="backBtn" class="back-btn">&#8592; Back</button>
        <h1>Vocabulary notebook</h1>
      </div>
      <div class="header-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search saved words...">
          <button id="searchBtn" aria-label="Search">&#128269;</button>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-left">
        <select id="dictionarySelect" aria-label="Built-in dictionary">
          <option value="">Choose a built-in dictionary to browse exam words.</option>
          <option value="gre">GRE vocabulary</option>
          <option value="toefl">TOEFL vocabulary</option>
          <option value="ielts">IELTS vocabulary</option>
          <option value="cet4">CET4 vocabulary</option>
          <option value="cet6">CET6 vocabulary</option>
        </select>
        <select id="sortBy" aria-label="Sort words">
          <option value="addedDate">Recently added</option>
          <option value="word">A to Z</option>
          <option value="masteryLevel">Mastery level</option>
          <option value="reviewCount">Review count</option>
        </select>
        <select id="filterBy" aria-label="Filter words">
          <option value="all">All words</option>
          <option value="new">New words</option>
          <option value="learning">Learning</option>
          <option value="mastered">Mastered</option>
          <option value="difficult">Difficult</option>
        </select>
      </div>
      <div class="toolbar-right">
        <span class="word-count"><span id="totalCount">0</span> saved words</span>
        <button id="loadDictionaryBtn" class="secondary-btn" style="display: none;">Load dictionary</button>
        <button id="exportBtn" class="secondary-btn">Export</button>
        <button id="reviewBtn" class="primary-btn">Review</button>
      </div>
    </div>

    <main class="vocabulary-main">
      <div id="vocabularyList" class="vocabulary-list">
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-icon">&#128218;</div>
        <h3>No saved words yet</h3>
        <p>Select text on a page, save the word, then review it here.</p>
        <p>Choose a built-in dictionary to browse exam words.</p>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading vocabulary...</p>
      </div>
    </main>

    <div class="pagination">
      <button id="prevPage" class="page-btn" disabled>Previous</button>
      <span class="page-info">
        Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
      </span>
      <button id="nextPage" class="page-btn" disabled>Next</button>
    </div>
  </div>

  <div id="wordModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalWord">Word</h2>
        <button id="closeModal" class="close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="word-details">
          <div class="detail-item">
            <label>Translation:</label>
            <span id="modalTranslation">Translation</span>
          </div>
          <div class="detail-item">
            <label>Context:</label>
            <span id="modalContext">Context</span>
          </div>
          <div class="detail-item">
            <label>Source:</label>
            <a id="modalSource" href="#" target="_blank">Source link</a>
          </div>
          <div class="detail-item">
            <label>Added:</label>
            <span id="modalAddedDate">Added date</span>
          </div>
          <div class="detail-item">
            <label>Reviews:</label>
            <span id="modalReviewCount">0</span>
          </div>
          <div class="detail-item">
            <label>Mastery:</label>
            <div class="mastery-level">
              <div id="modalMasteryLevel" class="mastery-bar">
                <div class="mastery-fill"></div>
              </div>
              <span id="modalMasteryText">New</span>
            </div>
          </div>
          <div class="detail-item">
            <label>Next review:</label>
            <span id="modalNextReview">Not scheduled</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="deleteWord" class="danger-btn">Delete</button>
        <button id="markAsMastered" class="secondary-btn">Mark mastered</button>
        <button id="reviewWord" class="primary-btn">Review now</button>
      </div>
    </div>
  </div>

  <script src="vocabulary.js"></script>
</body>
</html>
