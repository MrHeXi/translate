<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Translator - LexiBridge Translate</title>
  <link rel="stylesheet" href="document.css">
</head>
<body>
  <div class="document-page">
    <header class="document-header">
      <div>
        <h1>Document Translator</h1>
        <p id="sourceUrlInfo" class="source-url" hidden></p>
      </div>
      <button id="openOptions" class="secondary-btn">Settings</button>
    </header>

    <main class="document-main">
      <section class="document-toolbar" aria-label="Document translation controls">
        <label>
          Target
          <select id="targetLanguage"></select>
        </label>
        <label>
          Provider
          <select id="translationProvider"></select>
        </label>
        <label>
          Display
          <select id="displayMode">
            <option value="bilingual">Bilingual</option>
            <option value="translation-only">Translation only</option>
            <option value="original-only">Original only</option>
          </select>
        </label>
      </section>

      <section class="document-input">
        <div class="input-actions">
          <label class="file-picker">
            <input id="documentFile" type="file" accept=".txt,.md,.markdown,.html,.htm,.json,.docx,.epub,.srt,.vtt,.pdf,text/plain,text/markdown,text/html,application/xhtml+xml,application/json,text/json,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/epub+zip,application/pdf">
            Choose file
          </label>
          <button id="translateDocument" class="primary-btn">Translate document</button>
          <button id="exportSubtitleFile" class="secondary-btn" disabled>Export subtitles</button>
          <button id="exportJsonFile" class="secondary-btn" disabled>Export JSON</button>
          <button id="exportDocxFile" class="secondary-btn" disabled>Export DOCX</button>
          <button id="exportEpubFile" class="secondary-btn" disabled>Export EPUB</button>
          <button id="exportPdfFile" class="secondary-btn" disabled>Export PDF</button>
          <button id="clearDocument" class="secondary-btn">Clear</button>
        </div>
        <textarea id="sourceText" placeholder="Paste document text or load a PDF, HTML file, JSON file, DOCX, EPUB, or subtitle file."></textarea>
        <p id="documentMessage" class="document-message" role="status"></p>
      </section>

      <section class="document-progress" aria-label="Translation progress">
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <span id="progressText">0 blocks</span>
      </section>

      <div class="document-output">
        <section id="pdfViewer" class="pdf-viewer" aria-label="PDF page preview" hidden></section>
        <section id="translationResults" class="translation-results" aria-live="polite"></section>
      </div>
    </main>
  </div>

  <script src="document.js"></script>
</body>
</html>
